name: Docs Impact Monitor

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours to look back for workflow runs (default: 6)'
        required: false
        default: '6'
      create_prs:
        description: 'Create PRs with doc fixes (true/false)'
        required: false
        default: 'true'
  schedule:
    - cron: '30 1,7,13,19 * * *'  # Every 6 hours, offset from the source's 3-hour cycle

permissions:
  contents: read
  issues: write
  actions: write

env:
  MONITORED_REPO: MystenLabs/sui
  MONITORED_WORKFLOW: release-notes-monitor.yml
  DOCS_LLMS_URL: https://docs.sui.io/llms.txt
  DOCS_BASE_URL: https://docs.sui.io
  DOCS_REPO: MystenLabs/sui
  DOCS_REPO_PATH_PREFIX: docs/content

jobs:
  monitor-release-notes:
    name: Monitor Release Notes & Flag Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run docs impact monitor
        env:
          # GITHUB_TOKEN for reading public repos (workflow runs, PRs, file contents)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT for write operations (fork, push, create PRs on external repos)
          DOCS_MONITOR_PAT: ${{ secrets.DOCS_MONITOR_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONITORED_REPO: ${{ env.MONITORED_REPO }}
          MONITORED_WORKFLOW: ${{ env.MONITORED_WORKFLOW }}
          DOCS_LLMS_URL: ${{ env.DOCS_LLMS_URL }}
          DOCS_BASE_URL: ${{ env.DOCS_BASE_URL }}
          DOCS_REPO: ${{ env.DOCS_REPO }}
          DOCS_REPO_PATH_PREFIX: ${{ env.DOCS_REPO_PATH_PREFIX }}
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '6' }}
          THIS_REPO: ${{ github.repository }}
          # PR creation settings
          CREATE_PRS: ${{ inputs.create_prs || 'true' }}
          FORK_OWNER: ${{ vars.FORK_OWNER || secrets.FORK_OWNER }}
        run: python scripts/monitor.py
